<script type="module">
// index.html is now just the bootstrap: imports, login wiring, then auth flow.
// All UI logic lives in js/views.js; data layer in js/storage.js; etc.
import { sb } from './js/config.js';
import { state } from './js/state.js';
import { HWM_BUILD, HWM_DEBUG, dbg } from './js/helpers.js';
import { setOnDataChanged, setNavigateTo, loadEverything } from './js/storage.js';
import * as Utils from './js/utils.js';
import * as Views from './js/views.js';
const { render, renderHeader, setView } = Views;

dbg('%cISI Group Talent', 'color:#011e41;font-weight:600;font-size:14px', `build ${HWM_BUILD}`);

// Wire UI callbacks so storage can refresh the view after writes.
setOnDataChanged(() => render());
setNavigateTo((view) => setView(view));

// Expose things the inline onclick handlers need
window.sb = sb;

// Debug helper — exposes runtime state for console inspection.
// Gated on HWM_DEBUG so production users can't enumerate the user table from devtools.
// Enable with: localStorage.setItem('hwm_debug','1') then reload.
// Use in console: __debug.users(), __debug.lookup('uuid-here')
if (HWM_DEBUG) {
  window.__debug = {
    users: () => state.realUsersByUuid,
    userCount: () => Object.keys(state.realUsersByUuid).length,
    lookup: (uuid) => state.realUsersByUuid[uuid],
    hrbps: () => Object.values(state.realUsersByUuid).filter(u => u.role === 'hrbp'),
    employees: () => state.employeeMaps.list,
    emp: (id) => state.employeeMaps.list?.find(e => e.id === id),
    empByName: (name) => state.employeeMaps.list?.filter(e => (e.name_en || '').toLowerCase().includes(name.toLowerCase())),
    // Auth state — to debug "requester_id is null" bug
    authUser: () => state.currentAuthUser,
    authUserId: () => state.currentAuthUser?.id,
    member: () => state.currentMember,
    role: () => state.currentRole,
  };
}


// State (state.currentRole, state.requisitions, state.candidates, …) now lives in js/state.js,
// imported as `state` at the top of this module.


// ============================================================
// INIT — Supabase auth gate, then load, then render
// ============================================================

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (!email || !pw) { errEl.textContent = 'Enter your email and password.'; errEl.style.display='block'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = 'Sign in';
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  await bootAfterAuth();
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}
window.doLogout = doLogout;

async function bootAfterAuth() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  state.currentAuthUser = user;

  // Find tenant membership — MUST filter by user_id; RLS lets all tenant members
  // see each other's rows, so without this filter .limit(1) would return whoever
  // the DB returns first (typically the admin, since they were inserted first).
  const { data: members, error: memErr } = await sb.from('tenant_members')
    .select('id, tenant_id, role, status, tenants(id, name, slug)')
    .eq('user_id', user.id)
    .eq('status', 'active')
    .limit(1);
  if (memErr || !members?.length) {
    document.getElementById('loginErr').textContent = memErr?.message || 'No tenant membership found for this account.';
    document.getElementById('loginErr').style.display = 'block';
    await sb.auth.signOut();
    return;
  }
  state.currentMember = members[0];
  state.currentTenantId = members[0].tenant_id;

  // Pull the user's profile so we have their display name (full_name)
  const { data: myProfile } = await sb.from('profiles')
    .select('id, full_name, email')
    .eq('id', user.id)
    .single();
  if (myProfile) {
    // Attach it to currentAuthUser for renderHeader to use
    state.currentAuthUser.profile = myProfile;
  }

  // ⭐ Set the view based on the user's actual role in the tenant.
  // Admins default to 'requester' view but can use the switcher to preview others.
  // Hiring managers aren't a prototype view (they appear as interviewers inside recruiter views),
  // so they land on the recruiter view.
  const memberRole = state.currentMember.role;
  const roleToView = {
    requester: 'requester',
    hrbp: 'hrbp',
    function_head: 'function_head',
    ceo: 'ceo',
    head_ta: 'head_ta',
    recruiter: 'recruiter',
    hiring_manager: 'recruiter',   // HMs see the recruiter-style candidate view
    admin: 'requester',             // admins land on requester but can switch
    viewer: 'requester'             // viewers land on requester, read-only (not enforced in v1)
  };
  state.currentRole = roleToView[memberRole] || 'requester';

  // Load DB data into the prototype's in-memory arrays
  await loadEverything();

  // Language pref
  const savedLang = localStorage.getItem('hwm_lang') || 'en';
  state.currentLang = savedLang === 'km' ? 'km' : 'en';
  document.body.classList.toggle('lang-km', state.currentLang === 'km');

  // Hide login, render app
  document.getElementById('loginWrap').style.display = 'none';
  renderHeader();
  render();
}

async function init() {
  // Wire login controls
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  ['loginEmail','loginPassword'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  // If already logged in, skip straight to app
  const { data: { session } } = await sb.auth.getSession();
  if (session) await bootAfterAuth();
}
init();

// ============================================================
// Expose every Utils + Views export on `window` so inline onclick= handlers
// can call them. With <script type="module">, module-level identifiers are
// NOT global by default — this assignment bridges the two worlds. Harmless
// to expose helpers like _renderChannelCostModal that aren't used externally.
// closeModal is the most-called offender — it lives in utils.js and is
// referenced by ~30 onclick attributes across the app.
// ============================================================
Object.assign(window, Utils, Views);
</script>
