let currentAuthUser = null; // auth user

let roleLibMaps = { byTitle: {}, byId: {} };
let employeeMaps = { byId: {}, byCode: {}, byUserId: {}, list: [] };  // employees from master file
// BU table — list of business units, sorted ready for dropdown rendering.
// Loaded once at startup. Each entry: { id, code, name, sort_order, is_active }
let businessUnits = [];
// Lookup: real Supabase UUID → { id, name, email, role } built from tenant_members + profiles
let realUsersByUuid = {};

// Expose things the inline onclick handlers need
window.sb = sb;

// Debug helper — exposes runtime state for console inspection.
// Gated on HWM_DEBUG so production users can't enumerate the user table from devtools.
// Enable with: localStorage.setItem('hwm_debug','1') then reload.
// Use in console: __debug.users(), __debug.lookup('uuid-here')
if (HWM_DEBUG) {
  window.__debug = {
    users: () => realUsersByUuid,
    userCount: () => Object.keys(realUsersByUuid).length,
    lookup: (uuid) => realUsersByUuid[uuid],
    hrbps: () => Object.values(realUsersByUuid).filter(u => u.role === 'hrbp'),
    employees: () => employeeMaps.list,
    emp: (id) => employeeMaps.list?.find(e => e.id === id),
    empByName: (name) => employeeMaps.list?.filter(e => (e.name_en || '').toLowerCase().includes(name.toLowerCase())),
    // Auth state — to debug "requester_id is null" bug
    authUser: () => currentAuthUser,
    authUserId: () => currentAuthUser?.id,
    member: () => currentMember,
    role: () => currentRole,

}

  { id: 'R007', title: 'Finance Manager', function: 'Finance', grade: 'G8' },

// ⭐ ROLES defines the role categories used for dashboards and the admin
// role-switcher. Labels are fallbacks; the UI uses translated ROLES_LABELS at
// render time. All user identity now flows from real Supabase Auth UUIDs

const ROLES = {
  requester:     { label: 'Requester' },
  hrbp:          { label: 'HRBP' },
  function_head: { label: 'Function Head' },
  ceo:           { label: 'CEO' },
  head_ta:       { label: 'Head of TA' },
  recruiter:     { label: 'Recruiter' }
};

// Resources required for new hires — order preserved for display
const RESOURCE_TYPES = [
  { key: 'email',   tKey: 'res_email' },
  { key: 'laptop',  tKey: 'res_laptop' },

  revisions_requested: { label: 'Revisions Requested', color: '#b45309', bg: '#fef5e7' },

  cancelled: { label: 'Cancelled', color: '#73726c', bg: '#f3f1ea' }
};

// State
let currentUserId = null;  // set by auth flow after login
let currentRole = 'requester';
let currentView = 'dashboard';
let selectedReqId = null;

// Used by the Revise & Resubmit flow when a requester revises a returned req.
let editingReqId = null;
let requisitions = [];
let candidates = [];
let activities = [];
// Gap 3 — Onboarding records (one per hire). Populated from DB at load time;
// auto-created when an offer is accepted in offerResponse().
let onboardings = [];
let onboardingTab = 'starts';   // which tab is active in the Hires & Onboarding page
// Gap 2 — Sourcing channel periodic costs (per-period: e.g. "LinkedIn Q1 = $4,500")
let channelCosts = [];
let currentLang = 'en';

// Gap 2 — Cost fields are restricted to Head of TA (and admins, who can view-as-head_ta).
// This helper centralizes the check so adding a new cost-related UI element
// only requires one role gate to remember.
function isHeadOfTA() {
  return currentRole === 'head_ta' || currentMember?.role === 'admin';
}

// BU lookup: turn a buId into its display name. Returns 'Unknown' if missing.
// Used by detail views and lists to show BU context next to function/department.
function getBuName(buId) {
  if (!buId) return null;
  return (businessUnits || []).find(b => b.id === buId)?.name || null;
}

// ============================================================
// EXEC WORKFLOW helpers
// ============================================================

// Roles that can raise reqs on behalf of execs. Used to gate the New Req
// button on HRBP / Head of TA dashboards.
function canRaiseReqOnBehalf() {
  return ['hrbp', 'head_ta'].includes(currentRole) || currentMember?.role === 'admin';
}

// Returns list of employees marked as Function Head or CEO (for the
// "On behalf of" dropdown). Sorted with CEO first.
function getExecAuthorities() {
  const list = (employeeMaps.list || []).filter(e => e.is_function_head || e.is_ceo);
  // CEO first, then FHs alphabetically
  return list.sort((a, b) => {
    if (a.is_ceo && !b.is_ceo) return -1;
    if (b.is_ceo && !a.is_ceo) return 1;
    return (a.name_en || '').localeCompare(b.name_en || '');
  });
}

// Detect if a req is an exec hire (HM is FH or CEO). Drives the routing.
// Returns one of: 'normal', 'fh_hire' (HM is a FH), 'ceo_hire' (HM is the CEO).
function detectExecHireType(hmEmpId) {
  if (!hmEmpId) return 'normal';
  const hm = (employeeMaps.list || []).find(e => e.id === hmEmpId);
  if (!hm) return 'normal';
  if (hm.is_ceo) return 'ceo_hire';
  if (hm.is_function_head) return 'fh_hire';
  return 'normal';
}

// ---- MAPPERS: DB row (snake_case) <-> prototype object (camelCase) ----

function reqFromDb(row) {
  // Resolve dept names from IDs using deptMaps
  const fn = row.department_id     ? deptMaps.byId[row.department_id]?.name     : null;
  const sf = row.sub_function_id   ? deptMaps.byId[row.sub_function_id]?.name   : null;
  const un = row.unit_id           ? deptMaps.byId[row.unit_id]?.name           : null;
  return {
    _dbId: row.id,                               // UUID for future writes
    id: row.req_code,                            // prototype uses req_code as id
    roleId: row.role_id ? roleLibMaps.byId[row.role_id]?.legacyId : null,
    roleTitle: row.job_title,
    isNewRole: !!row.is_new_role,
    // Business Unit (top-level dimension above function)
    buId: row.bu_id || null,
    function: fn,
    subFunction: sf,
    unit: un,
    // Exec workflow — when HRBP/Head of TA raises on behalf of a Function Head or CEO,
    // this captures who the actual exec authority is.
    raisedOnBehalfOfEmpId: row.raised_on_behalf_of_employee_id || null,
    grade: row.grade,
    isReplacement: !!row.is_replacement,
    isPlanned: row.is_planned !== false,
    justification: row.justification,
    hrbpJustification: row.hrbp_justification,
    fhJustification: row.fh_justification,
    ceoJustification: row.ceo_justification,
    // Real Supabase UUIDs — getUserName() resolves these via realUsersByUuid.
    // If a UUID isn't in our tenant (shouldn't happen in production), getUser
    // returns null and display code shows "Unknown" gracefully.
    requesterId: row.requester_id || null,
    immediateSupervisorId: row.immediate_supervisor_id || null,
    hiringManagerId: row.hiring_manager_id || null,
    // Real UUIDs for ownership checks (multi-user filtering, etc.)
    realRequesterId: row._requester_real || null,
    realSupervisorId: row._supervisor_real || null,
    realHiringManagerId: row._hm_real || null,
    // Employee-table refs (canonical supervisor/HM after Phase B import).
    // realSupervisorEmpId / realHmEmpId mirror the DB value so approvers
    // don't accidentally overwrite them during updates.
    supervisorEmpId: row.immediate_supervisor_employee_id || null,
    hmEmpId: row.hiring_manager_employee_id || null,
    realSupervisorEmpId: row.immediate_supervisor_employee_id || null,
    realHmEmpId: row.hiring_manager_employee_id || null,
    jdFilename: row.jd_filename,
    jdStoragePath: row.jd_storage_path,
    jdUploadedAt: row.jd_uploaded_at,
    status: row.workflow_status,
    approvalPath: row.approval_path || 'standard',
    submittedAt: row.submitted_at,
    hrbpApprovedAt: row.hrbp_approved_at,
    fhApprovedAt: row.fh_approved_at,
    ceoApprovedAt: row.ceo_approved_at,
    taAssignedAt: row.ta_assigned_at,
    assignedRecruiters: row._recruiters_legacy || [],
    targetFillDate: row.target_fill_date,
    rejectionReason: row.rejection_reason,
    revisionNotes: row.revision_notes,
    holdReason: row.hold_reason,
    holdUntil: row.hold_until,
    cancelReason: row.cancel_reason,
    resourcesRequired: row.resources_required || { items: [], other: null },
    updatedAt: row.updated_at,
  };
}

/* ===== ENTITY RESOLVER (defensive) =====
   Robustly look up a department/sub_function/unit ID from a name.
   Handles:
   - Empty/null input → returns null
   - Missing deptMaps → logs warning, returns null
   - Case-insensitive fallback if exact match fails
   - Whitespace trimming
   Logs to console with [ENTITY-RESOLVE] prefix when something goes wrong.
*/
function resolveDeptId(level, rawName) {
  // No selection? Nothing to resolve. Not an error.
  if (!rawName || (typeof rawName === 'string' && rawName.trim() === '')) {
    return null;
  }

  const name = String(rawName).trim();

  // Bail loudly if the dept cache wasn't built — this is the bug we're hunting.
  if (!deptMaps || !deptMaps.byName || Object.keys(deptMaps.byName).length === 0) {
    console.warn('[ENTITY-RESOLVE] deptMaps not loaded; cannot resolve', level, '→', name,
      '— req will be saved with NULL for this field. Re-load the page and try again.');
    return null;
  }

  // Exact match (the original code path)
  const exact = deptMaps.byName[`${level}:${name}`];
  if (exact?.id) return exact.id;

  // Case-insensitive fallback — in case the form value differs in casing/spacing
  // from what's stored in the departments table.
  const target = name.toLowerCase();
  for (const key of Object.keys(deptMaps.byName)) {
    const [keyLevel, keyName] = key.split(':');
    if (keyLevel === level && keyName.toLowerCase().trim() === target) {
      console.warn(`[ENTITY-RESOLVE] case/whitespace mismatch resolved: form sent "${name}" → matched DB "${keyName}"`);
      return deptMaps.byName[key].id;
    }
  }

  // Truly unresolvable. Log the candidates for debugging.
  const candidates = Object.keys(deptMaps.byName).filter(k => k.startsWith(level + ':')).slice(0, 8);
  console.warn(`[ENTITY-RESOLVE] could not resolve ${level} "${name}". First few available ${level}s:`, candidates);
  return null;
}

function reqToDb(r) {
  // Map camelCase -> snake_case for INSERT/UPDATE
  // Use the robust resolver (handles missing deptMaps, case mismatches, etc.)
  const fnId = resolveDeptId('function',     r.function);
  const sfId = resolveDeptId('sub_function', r.subFunction);
  const unId = resolveDeptId('unit',         r.unit);
  // Look up the role by legacyId first (unique per row). Fall back to byTitle for
  // legacy reqs that still use the title-only path.
  const roleLibId = r.roleId
    ? (roleLibMaps.byLegacyId?.[r.roleId]?.id || roleLibMaps.byTitle?.[r.roleTitle]?.id || null)
    : null;
  // CRITICAL: preserve the real requester/supervisor/HM across updates.
  // - For NEW reqs (no _dbId), default to currentAuthUser
  // - For EXISTING reqs, use the realRequesterId that was loaded from the DB
  // Never overwrite these fields on approve/reject/assign — the approver is NOT the requester.
  const isNewReq = !r._dbId;
  const requesterUuid = isNewReq
    ? currentAuthUser?.id
    : (r.realRequesterId || null);
  const supervisorUuid = isNewReq
    ? currentAuthUser?.id
    : (r.realSupervisorId || null);
  const hmUuid = isNewReq
    ? currentAuthUser?.id
    : (r.realHiringManagerId || null);
  // ⭐ Same rule for the employee_id columns: new reqs carry the picker values;
  // existing reqs preserve whatever was in the DB (don't let approvers overwrite).
  const supEmpIdForDb = isNewReq
    ? (r.supervisorEmpId || null)
    : (r.realSupervisorEmpId || null);
  const hmEmpIdForDb = isNewReq
    ? (r.hmEmpId || null)
    : (r.realHmEmpId || null);
  // Diagnostic: warn if a new req is being saved without a requester_id.
  // Catches the auth-state bug where currentAuthUser was null at save time.
  if (isNewReq && !requesterUuid) {
    console.warn('[reqToDb] NEW req has no requester_id', {
      currentAuthUser_present: !!currentAuthUser,
      currentAuthUser_id: currentAuthUser?.id,
      currentMember_present: !!currentMember,
      currentMember_role: currentMember?.role,
      r_id: r.id,
    });
  }
  return {
    req_code: r.id,
    job_title: r.roleTitle,
    role_id: roleLibId,
    is_new_role: r.isNewRole,
    grade: r.grade,
    bu_id: r.buId || null,
    department_id: fnId,
    sub_function_id: sfId,
    unit_id: unId,
    raised_on_behalf_of_employee_id: r.raisedOnBehalfOfEmpId || null,
    is_replacement: r.isReplacement,
    is_planned: r.isPlanned,
    justification: r.justification,
    hrbp_justification: r.hrbpJustification,
    fh_justification: r.fhJustification,
    ceo_justification: r.ceoJustification,
    requester_id: requesterUuid,
    immediate_supervisor_id: supervisorUuid,
    hiring_manager_id: hmUuid,
    immediate_supervisor_employee_id: supEmpIdForDb,
    hiring_manager_employee_id: hmEmpIdForDb,
    jd_filename: r.jdFilename,
    workflow_status: r.status,
    approval_path: r.approvalPath || 'standard',
    status: 'open',
    submitted_at: r.submittedAt,
    hrbp_approved_at: r.hrbpApprovedAt,
    fh_approved_at: r.fhApprovedAt,
    ceo_approved_at: r.ceoApprovedAt,
    ta_assigned_at: r.taAssignedAt,
    target_fill_date: r.targetFillDate,
    rejection_reason: r.rejectionReason,
    revision_notes: r.revisionNotes,
    hold_reason: r.holdReason,
    hold_until: r.holdUntil,
    cancel_reason: r.cancelReason,
    resources_required: r.resourcesRequired || { items: [], other: null },
    tenant_id: currentTenantId,
  };
}

function candFromDb(row, appRow) {
  // Merge candidate row with its application row (one-to-one in prototype model)
  const c = {
    _dbId: row.id,
    _appDbId: appRow?.id,
    id: `CAN-${row.id.slice(0, 8)}`,              // human-ish short id
    reqId: appRow?._req_legacy,                   // filled by loader
    name: row.full_name,
    email: row.email,
    phone: row.phone,
    source: (row.source || '').replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase()),
    cvFilename: row.cv_filename,
    cvStoragePath: row.cv_storage_path,
    cvUploadedAt: row.cv_uploaded_at,
    notes: row.notes,
    // Demographics — read straight from DB columns
    gender: row.gender || null,
    dateOfBirth: row.date_of_birth || null,
    yearsExperience: row.years_experience ?? null,
    educationLevel: row.education_level || null,
    nationality: row.nationality || null,

    agencyFeeUsd: row.agency_fee_usd != null ? Number(row.agency_fee_usd) : null,
    referralEmployeeId: row.referral_employee_id || null,
    referralBonusUsd: row.referral_bonus_usd != null ? Number(row.referral_bonus_usd) : null,
    directCostUsd: row.direct_cost_usd != null ? Number(row.direct_cost_usd) : null,
    stage: appRow?.candidate_stage || 'sourcing',
    addedAt: appRow?.applied_at || row.created_at,
    stageChangedAt: appRow?.stage_changed_at || row.created_at,
    status: appRow?.status === 'active' ? 'active' : (appRow?.status || 'active'),
    interview: null,
    feedback: [],
    preEmploymentChecks: {
      reference: !!appRow?.checks_reference,
      background: !!appRow?.checks_background,
      criminal: !!appRow?.checks_criminal,
      education: !!appRow?.checks_education,
      coi: !!appRow?.checks_coi,
      coiStoragePath: appRow?.coi_storage_path || null,
      coiFilename: appRow?.coi_filename || null,
      coiUploadedAt: appRow?.coi_uploaded_at || null,
      notes: appRow?.checks_notes || ''
    },
    offer: appRow?.offer_status ? {
      salary: appRow.offer_salary,
      grade: appRow.offer_grade,
      startDate: appRow.offer_start_date,
      benefits: appRow.offer_benefits,
      notes: appRow.offer_notes,
      sentAt: appRow.offer_sent_at,
      status: appRow.offer_status
    } : null
  };
  return c;

function activityFromDb(row) {
  const reqByDbId = requisitions.find(r => r._dbId === row.entity_id);
  return {
    reqId: reqByDbId?.id || row.entity_id,
    date: row.created_at,
    text: (row.metadata?.text) || row.action.replace(/_/g, ' '),
    visibleTo: ['all']
  };
}

// ---- Main loader: fetch everything from Supabase into in-memory arrays ----
async function loadEverything() {
  const t = currentTenantId;

  // Parallel fetch
  const [deptsRes, rolesRes, reqsRes, candsRes, appsRes, ivRes, ivfRes, reqRecRes, actRes, membersRes, empsRes, onboardingsRes, channelCostsRes, businessUnitsRes] = await Promise.all([
    sb.from('departments').select('*').eq('tenant_id', t),
    sb.from('role_library').select('*').eq('tenant_id', t).eq('is_active', true),
    sb.from('requisitions').select('*').eq('tenant_id', t).is('deleted_at', null).order('created_at'),
    sb.from('candidates').select('*').eq('tenant_id', t).is('deleted_at', null),
    sb.from('applications').select('*').eq('tenant_id', t),
    sb.from('interviews').select('*').eq('tenant_id', t),
    sb.from('interview_feedback').select('*').eq('tenant_id', t),
    sb.from('requisition_recruiters').select('*'),
    sb.from('activity_log').select('*').eq('tenant_id', t).order('created_at', { ascending: false }).limit(200),
    // Fetch all active tenant members with their profiles — so getUserName can resolve real UUIDs
    // Use explicit FK hint (!tenant_members_user_id_fkey) so PostgREST knows
    // which relationship to use for the embedded profiles join.
    sb.from('tenant_members')
      .select('user_id, role, profiles!tenant_members_user_id_fkey(id, full_name, email)')
      .eq('tenant_id', t).eq('status', 'active'),
    // Employees: source of truth for Supervisor/HM pickers. Includes people
    // without logins (most of the 745). Name resolution + dropdowns pull from here.
    sb.from('employees').select('id, employee_code, name_en, name_kh, position_title, grade, function_id, department_id, company_email, user_id, company, is_function_head, is_ceo').eq('tenant_id', t).eq('status', 'Active').order('name_en'),
    // Gap 3 — Onboarding records. Always fetched (table may be empty initially).
    sb.from('onboarding').select('*').eq('tenant_id', t).is('deleted_at', null),
    // Gap 2 — Periodic channel costs (e.g. "LinkedIn Recruiter Q1 = $4,500")
    sb.from('sourcing_channel_costs').select('*').eq('tenant_id', t).is('deleted_at', null).order('period_start', { ascending: false }),
    // Business Units — top-level dimension for cross-BU reporting (e.g. ISI Steel, Brown Coffee)
    // Sort by sort_order (ISI Group=1 first), then alphabetical by name.
    sb.from('business_units').select('*').eq('tenant_id', t).is('deleted_at', null).eq('is_active', true).order('sort_order').order('name'),
  ]);

  // Build the real-users lookup from tenant_members + profiles
  realUsersByUuid = {};
  let _membersData = membersRes.data || [];
  // Detect if the embedded join failed (profiles came back null even though
  // we have member rows). If so, fall back to fetching profiles separately.
  const embeddedJoinFailed = _membersData.length > 0 && _membersData.every(m => !m.profiles);
  if (embeddedJoinFailed) {
    console.warn('[hwm] embedded profiles join returned null, falling back to separate fetch');
    const userIds = _membersData.map(m => m.user_id);
    const { data: profilesData } = await sb.from('profiles')
      .select('id, full_name, email')
      .in('id', userIds);
    const profileById = {};
    (profilesData || []).forEach(p => { profileById[p.id] = p; });
    _membersData = _membersData.map(m => ({ ...m, profiles: profileById[m.user_id] || null }));
  }
  _membersData.forEach(m => {
    if (m.profiles) {
      realUsersByUuid[m.user_id] = {
        id: m.user_id,
        name: m.profiles.full_name || m.profiles.email || 'Unknown',
        email: m.profiles.email,
        role: m.role,
      };
    }
  });
  dbg('[hwm] realUsersByUuid populated with', Object.keys(realUsersByUuid).length, 'users');

  // Build dept maps
  deptMaps = { byName: {}, byId: {} };
  (deptsRes.data || []).forEach(d => {
    deptMaps.byId[d.id] = d;
    deptMaps.byName[`${d.level}:${d.name}`] = d;
  });

  // ⭐ Build REAL_ORG_STRUCTURE from DB, overwriting the hardcoded ORG_STRUCTURE.
  // Walks the parent_id tree: function → sub_function → unit
  // Shape: { 'Commercial': { 'Key Account': ['...sections...'], 'Marketing': [] }, ... }
  const allDepts = deptsRes.data || [];
  const fns = allDepts.filter(d => d.level === 'function');
  const sfs = allDepts.filter(d => d.level === 'sub_function');
  const uns = allDepts.filter(d => d.level === 'unit');
  const newOrg = {};
  fns.forEach(fn => {
    newOrg[fn.name] = {};
    sfs.filter(sf => sf.parent_id === fn.id).forEach(sf => {
      newOrg[fn.name][sf.name] = uns
        .filter(un => un.parent_id === sf.id)
        .map(un => un.name)
        .sort();
    });
  });
  // Sort function names and dept names alphabetically for consistent UI
  const sortedOrg = {};
  Object.keys(newOrg).sort().forEach(fn => {
    sortedOrg[fn] = {};
    Object.keys(newOrg[fn]).sort().forEach(sf => {
      sortedOrg[fn][sf] = newOrg[fn][sf];
    });
  });
  // Replace ORG_STRUCTURE contents in-place (keep reference)
  Object.keys(ORG_STRUCTURE).forEach(k => delete ORG_STRUCTURE[k]);
  Object.assign(ORG_STRUCTURE, sortedOrg);
  dbg('[hwm] ORG_STRUCTURE rebuilt from DB:', Object.keys(ORG_STRUCTURE).length, 'functions');

  // Build role library maps
  roleLibMaps = { byTitle: {}, byId: {}, byLegacyId: {} };
  (rolesRes.data || []).forEach((r, i) => {
    const legacyId = `R${String(i + 1).padStart(3, '0')}`;
    r.legacyId = legacyId;
    // byTitle may collide across variants; last-write-wins is intentional for
    // legacy fallback. byLegacyId is guaranteed unique per row.
    roleLibMaps.byTitle[r.title] = r;
    roleLibMaps.byId[r.id] = r;
    roleLibMaps.byLegacyId[legacyId] = r;
  });
  // Overwrite EXISTING_ROLES (the prototype's dropdown source) with DB data
  EXISTING_ROLES.length = 0;
  (rolesRes.data || []).forEach(r => {
    EXISTING_ROLES.push({
      id: r.legacyId,
      title: r.title,
      function: deptMaps.byId[r.function_id]?.name || '',
      grade: r.grade
    });
  });

  // ⭐ Build employee lookup maps from the master-file import. The `list` is
  // used as the autocomplete source for Supervisor/HM pickers. byId and
  // byCode resolve selected values back to the canonical employee record.
  // byUserId lets us reverse-lookup: given a login UUID, find the employee.
  employeeMaps = { byId: {}, byCode: {}, byUserId: {}, list: [] };
  (empsRes?.data || []).forEach(e => {
    employeeMaps.byId[e.id] = e;
    employeeMaps.byCode[e.employee_code] = e;
    if (e.user_id) employeeMaps.byUserId[e.user_id] = e;
    employeeMaps.list.push(e);
  });
  dbg('[hwm] employees loaded:', employeeMaps.list.length);

  // Build the recruiters-per-req lookup (M:N table)
  const recsByReq = {};
  (reqRecRes.data || []).forEach(rec => {
    (recsByReq[rec.requisition_id] = recsByReq[rec.requisition_id] || []).push(rec.user_id);
  });

  // Transform requisitions
  requisitions = (reqsRes.data || []).map(row => {
    // Recruiter assignments — only real tenant-member UUIDs are kept; unknown
    // UUIDs would indicate a stale row and are dropped rather than masked.
    row._recruiters_legacy = (recsByReq[row.id] || []).filter(uid => realUsersByUuid[uid]);
    // Preserve the REAL UUIDs from the DB for ownership filtering.
    row._requester_real = row.requester_id;
    row._supervisor_real = row.immediate_supervisor_id;
    row._hm_real = row.hiring_manager_id;
    return reqFromDb(row);
  });

  // Transform candidates — merge with applications
  const appsByCandReq = {};
  (appsRes.data || []).forEach(a => {
    const k = `${a.candidate_id}__${a.requisition_id}`;
    appsByCandReq[k] = a;
  });
  // Also need to know req code for each application
  const reqByDbId = {};
  requisitions.forEach(r => { reqByDbId[r._dbId] = r.id; });

  candidates = [];
  (appsRes.data || []).forEach(a => {
    const candRow = (candsRes.data || []).find(c => c.id === a.candidate_id);
    if (!candRow) return;
    a._req_legacy = reqByDbId[a.requisition_id];
    const c = candFromDb(candRow, a);
    // Attach interview (first one for this app, if any)
    const iv = (ivRes.data || []).find(i => i.application_id === a.id);
    if (iv) {
      c.interview = {
        datetime: iv.scheduled_at,
        type: ({phone:'Phone',video:'Video Call',onsite:'In-person',panel:'Panel',take_home:'Take-home',technical:'Technical',cultural:'Cultural'})[iv.interview_type] || iv.interview_type,
        interviewers: [],  // will be populated from interview_interviewers table when wired
        location: iv.location_or_link || '',
        notes: iv.summary || ''
      };
      // Attach feedback
      c.feedback = (ivfRes.data || []).filter(f => f.interview_id === iv.id).map(f => ({
        interviewerId: null,
        rating: ({strong_hire:'Strong Yes',hire:'Yes',maybe:'Maybe',no_hire:'No',strong_no_hire:'Strong No'})[f.recommendation] || f.recommendation,
        notes: f.strengths || '',
        submittedAt: f.submitted_at
      }));
    }
    candidates.push(c);
  });

  // Transform activity log
  activities = (actRes.data || []).map(activityFromDb);

  // Gap 3 — Onboarding records. Stored DB-shape is camelCased here for consistency
  // with the rest of the in-memory model (camelCase). Empty array if none.
  onboardings = (onboardingsRes?.data || []).map(onboardingFromDb);

  // Gap 2 — Channel costs (periodic LinkedIn / job board / agency subscriptions, etc.)
  channelCosts = (channelCostsRes?.data || []).map(channelCostFromDb);

  // Business Units — already sorted by sort_order then name from the query.
  businessUnits = (businessUnitsRes?.data || []);
}

// Gap 3 — Auto-create an onboarding row when an offer is accepted. Idempotent —
// if a row already exists for this application_id, returns it without re-creating.
// Called from offerResponse() right after the requisition save succeeds.
async function autoCreateOnboardingForHire(candidate) {
  // Sanity checks
  if (!candidate?._appDbId) {
    console.warn('[onboarding] candidate has no application _dbId — cannot auto-create');
    return null;
  }
  if (!candidate.offer?.startDate) {
    console.warn('[onboarding] no offer start date — cannot auto-create');
    return null;
  }

  // Idempotent: check if one already exists for this application
  const existing = onboardings.find(o => o.applicationId === candidate._appDbId);
  if (existing) return existing;

  // Compute probation_end_date = start_date + 30 days (Cambodia standard)
  const startDate = new Date(candidate.offer.startDate);
  const probationEnd = new Date(startDate);
  probationEnd.setDate(probationEnd.getDate() + 30);

  const newRow = {
    applicationId: candidate._appDbId,
    candidateId: candidate._dbId || null,
    requisitionId: requisitions.find(r => r.id === candidate.reqId)?._dbId || null,
    intendedStartDate: candidate.offer.startDate,
    probationEndDate: probationEnd.toISOString().slice(0, 10),
    probationOutcome: 'pending',
  };
  try {
    await saveOnboardingRecord(newRow);
    onboardings.push(newRow);
    return newRow;
  } catch (e) {
    console.error('[onboarding] auto-create failed:', e);
    // Don't toast — this is a background task. Failure here shouldn't block the offer flow.
    return null;
  }
}

// ---- The drop-in replacement for saveData ----
// The prototype calls saveData('requisitions', requisitions), saveData('candidates', candidates), etc.
// We intercept and persist whichever entity was just mutated.
// Strategy: diff recent changes by checking in-memory arrays against DB.
// Simpler strategy used here: full upsert of all rows in the given entity.
// This is NOT efficient for a big dataset but is perfectly fine for the prototype's scale (~5-20 reqs).

async function saveData(key, value) {
  if (!currentTenantId) return;
  try {
    if (key === 'requisitions') await saveRequisitions(value);
    else if (key === 'candidates') await saveCandidates(value);
    else if (key === 'activities') await saveActivitiesTail(value);
    else if (key === 'currentLang') localStorage.setItem('hwm_lang', value);
  } catch (e) {
    console.error('saveData failed:', key, e);
    toast('Save failed: ' + (e.message || e), true);
  }
}

async function saveRequisitions(list) {

  for (const r of list) {
    const dbPayload = reqToDb(r);
    // Defensive: if any entity ID came back null despite a form value, query DB directly.
    await enrichEntityIdsFromDb(r, dbPayload);
    if (r._dbId) {
      // Update existing
      const { error } = await sb.from('requisitions').update(dbPayload).eq('id', r._dbId);
      if (error) throw error;
    } else {
      // New requisition
      const { data, error } = await sb.from('requisitions').insert(dbPayload).select().single();
      if (error) throw error;
      r._dbId = data.id;
    }
  }
  toast('Saved');
}

// Targeted insert/update for ONE requisition. Faster than saveRequisitions when
// you know exactly which row changed. Also lets callers await the result so
// downstream activity logging sees the freshly-set _dbId.
/* ===== ENTITY ID FALLBACK FROM DB =====
   If reqToDb returned null IDs for fields that the form actually filled,
   query the departments table directly as a last resort. This handles the
   case where deptMaps somehow didn't load but the database still has valid data.
   Mutates dbPayload in place. Safe no-op if everything already resolved.
*/
async function enrichEntityIdsFromDb(r, dbPayload) {
  // Build list of (formValue, level, payloadKey) tuples that need backfill.
  const checks = [
    { formValue: r.function,    level: 'function',     key: 'department_id'   },
    { formValue: r.subFunction, level: 'sub_function', key: 'sub_function_id' },
    { formValue: r.unit,        level: 'unit',         key: 'unit_id'         },
  ];

  // Only check ones where the form had a value but the payload is null.
  const needBackfill = checks.filter(c =>
    c.formValue && String(c.formValue).trim() !== '' && !dbPayload[c.key]
  );

  if (needBackfill.length === 0) return; // happy path

  console.warn('[ENTITY-DB-FALLBACK] reqToDb returned null for', needBackfill.map(c => c.level).join(', '),
    '— querying departments table directly');

  for (const c of needBackfill) {
    try {
      const { data, error } = await sb.from('departments')
        .select('id, name, level')
        .eq('tenant_id', currentTenantId)
        .eq('level', c.level)
        .ilike('name', String(c.formValue).trim())  // case-insensitive
        .is('deleted_at', null)
        .limit(1);
      if (error) {
        console.error('[ENTITY-DB-FALLBACK] query failed for', c.level, error.message);
        continue;
      }
      if (data && data.length > 0) {
        dbPayload[c.key] = data[0].id;
        dbg('[ENTITY-DB-FALLBACK] resolved', c.level, '"' + c.formValue + '" →', data[0].id);
      } else {
        console.warn('[ENTITY-DB-FALLBACK] no match in DB for', c.level, '"' + c.formValue + '"');
      }
    } catch (e) {
      console.error('[ENTITY-DB-FALLBACK] unexpected error', e);
    }
  }
}

    const { data, error } = await sb.from('requisitions').update(dbPayload).eq('id', r._dbId).select();
    if (error) throw error;

// Wrapper for candidate-side mutations (moveCandidate, rejectCandidate, etc).
/* ===== ERROR TRANSLATOR =====
   Convert cryptic Supabase / Postgres / Storage errors into messages
   recruiters will understand. Returns { title, hint } where hint may be ''.
*/
function friendlyError(e) {
  const code = e?.code || '';
  const msg = (e?.message || String(e) || '').toLowerCase();

  // 23505 = unique constraint violation
  if (code === '23505' || msg.includes('duplicate key value')) {
    if (msg.includes('cand_tenant_email_uidx') || msg.includes('email')) {
      return {
        title: 'A candidate with this email already exists',
        hint: 'Please check your candidate list, or use a different email if this is a different person.'
      };
    }
    if (msg.includes('phone')) {
      return { title: 'A candidate with this phone number already exists', hint: '' };
    }
    return { title: 'This record already exists', hint: 'Please check for duplicates and try again.' };
  }

  // Storage size limit
  if (msg.includes('exceeded the maximum allowed size') || msg.includes('payload too large')) {
    return {
      title: 'CV file is too large',
      hint: 'Please compress the PDF or upload a smaller version (under 5 MB recommended).'
    };
  }

  // RLS / auth
  if (msg.includes('row level security') || msg.includes('blocked by database policy')) {
    return {
      title: 'You don\'t have permission to do this',
      hint: 'Contact your administrator if you believe this is an error.'
    };
  }

  // Network / fetch
  if (msg.includes('failed to fetch') || msg.includes('network')) {
    return { title: 'Connection problem', hint: 'Check your internet and try again.' };
  }

  // Default — pass through original message
  return { title: e?.message || 'Save failed', hint: '' };
}

// Resolve a user id to a display object. Checks real Supabase users (from
// tenant_members + profiles) FIRST, then falls back to employee master records
// (for supervisors/HMs who don't have a login). Returns null for unknown IDs;
// callers should use getUserName() which shows "Unknown" in that case.
function getUser(id) {
  if (!id) return null;
  // 1. Real logged-in tenant member (auth.users.id)
  if (realUsersByUuid[id]) return realUsersByUuid[id];
  // 2. Employee from the master file (employees.id) — for supervisors/HMs
  //    who don't have a login. Normalize to the same shape as a user record.
  if (employeeMaps.byId[id]) {
    const e = employeeMaps.byId[id];
    return {
      id: e.id,
      name: e.name_en,
      role: 'employee',
      dept: e.position_title || '',
      email: e.company_email || '',
      _employee: true,
    };
  }
  return null;
}
function getUserName(id) {
  const u = getUser(id);
  return u?.name || 'Unknown';
}
function getUserInitials(id) {
  const u = getUser(id);
  if (!u?.name) return '?';
  return u.name.split(/\s+/).map(n => n[0]).filter(Boolean).join('').substring(0, 2).toUpperCase();
}

// Resolve the role label for a user UUID. Used by getRequesterDisplay to
// show "Tim Raksa (HRBP)" instead of just "Tim Raksa". Returns null if
// the user / role can't be resolved.
function getUserRoleLabel(uuid) {
  if (!uuid) return null;
  const u = realUsersByUuid?.[uuid];
  if (!u?.role) return null;
  const labels = {
    requester: 'Requester',
    hrbp: 'HRBP',
    function_head: 'Function Head',
    ceo: 'CEO',

  };
  return labels[u.role] || u.role;
}

// Display the requester for a requisition, with on-behalf-of context.
// - Normal req:        "Tim Raksa (HRBP)"
// - On-behalf-of req:  "Tim Raksa (HRBP, on behalf of Kang Samnang)"
// - Unknown user:      "Unknown" (no role tag, no on-behalf decoration)
function getRequesterDisplay(r) {
  const requesterName = getUserName(r.requesterId);
  const roleLabel = getUserRoleLabel(r.requesterId);
  // Build "Name (RoleLabel)" or just "Name" if role unknown
  const base = roleLabel ? `${requesterName} (${roleLabel}` : requesterName;
  // If raised on behalf of an exec, append context to the parens
  if (r.raisedOnBehalfOfEmpId) {
    const exec = (employeeMaps.list || []).find(e => e.id === r.raisedOnBehalfOfEmpId);
    const execName = exec ? (exec.name_en || exec.name_kh) : 'an executive';
    return roleLabel
      ? `${base}, on behalf of ${execName})`
      : `${requesterName} (on behalf of ${execName})`;
  }
  // Normal req — close the parens if we opened them
  return roleLabel ? `${base})` : requesterName;
}

// Return tenant members whose role is in the given list. Only real Supabase
// users are considered — the demo USERS array has been retired.
function getUsersWithRoles(roleList) {
  return Object.values(realUsersByUuid).filter(u => roleList.includes(u.role));
}

// ⭐ Resolve a requisition's supervisor/HM for display. Prefers the canonical
// employee record (supervisorEmpId/hmEmpId) over the legacy user_id columns.
// Falls back to legacy getUserName lookup for reqs created before Phase B.
function getSupervisorName(r) {
  if (r.supervisorEmpId && employeeMaps.byId[r.supervisorEmpId]) {
    return employeeMaps.byId[r.supervisorEmpId].name_en;
  }
  return getUserName(r.immediateSupervisorId);
}
function getHiringManagerName(r) {
  if (r.hmEmpId && employeeMaps.byId[r.hmEmpId]) {
    return employeeMaps.byId[r.hmEmpId].name_en;
  }
  return getUserName(r.hiringManagerId);
}

function daysSince(dateStr) { if (!dateStr) return 0; return Math.floor((new Date() - new Date(dateStr)) / (24*60*60*1000)); }
function daysUntil(dateStr) { if (!dateStr) return 0; return Math.floor((new Date(dateStr) - new Date()) / (24*60*60*1000)); }
function formatDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
function formatDateTime(d) { if (!d) return '—'; return new Date(d).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }

function getSLAClass(days, target) {
  if (target === 0) return '';
  if (days <= target) return 'sla-good';
  if (days <= target * 1.5) return 'sla-warning';
  return 'sla-bad';
}
function getSLATarget(status) {
  return { hrbp_review: 2, fh_approval: 2, ceo_approval: 5, ta_assignment: 2 }[status] || 0;
}
function calculateTargetFillDate(grade, approvalDate) {
  const g = parseInt(grade.replace('G',''));
  let days = 30;
  if (g >= 6 && g <= 7) days = 45;
  else if (g >= 8) days = 60;
  const d = new Date(approvalDate);
  d.setDate(d.getDate() + days);
  return d.toISOString();
}
function getStageDate(r) {
  if (r.status === 'hrbp_review') return r.submittedAt;
  if (r.status === 'fh_approval') return r.hrbpApprovedAt;
  if (r.status === 'ceo_approval') return r.fhApprovedAt;
  if (r.status === 'ta_assignment') return r.ceoApprovedAt || r.fhApprovedAt;
  if (r.status === 'active_sourcing') return r.taAssignedAt;
  return r.submittedAt;
}
function getCurrentOwner(r) {
  if (r.status === 'hrbp_review') return t('role_hrbp');
  if (r.status === 'fh_approval') return t('role_function_head');
  if (r.status === 'ceo_approval') return t('role_ceo');
  if (r.status === 'ta_assignment') return t('role_head_ta');
  if (r.status === 'active_sourcing') return r.assignedRecruiters.length === 0 ? 'Unassigned' : r.assignedRecruiters.map(getUserName).join(', ');
  if (r.status === 'pending_close') return t('role_hrbp');
  if (r.status === 'on_hold') return getUserName(r.requesterId);
  if (r.status === 'cancelled') return '—';
  return '—';
}

function statusBadge(status) {
  const cfg = STATUS_CONFIG[status] || { label: status, color: '#73726c', bg: '#f3f1ea' };
  const label = getStatusLabel(status);
  return `<span class="stage-tag" style="background: ${cfg.bg}; color: ${cfg.color};"><span class="stage-tag-dot" style="background: ${cfg.color};"></span>${label}</span>`;
}

// Render the resources-required block for any detail view (requester/HRBP/FH/CEO/Head TA).
// Returns an HTML string. Empty resources render as a muted "none requested" hint.
function renderResourcesBlock(r) {
  const res = r.resourcesRequired || { items: [], other: null };
  const items = Array.isArray(res.items) ? res.items : [];
  if (items.length === 0) {
    return `
      <div class="detail-block">
        <div class="detail-label">${t('lbl_resources_detail')}</div>
        <div class="detail-value" style="color: var(--ink-3); font-style: italic;">${t('resources_none')}</div>
      </div>
    `;
  }
  const pillStyle = 'display:inline-flex; align-items:center; gap:0.35rem; padding:0.25rem 0.6rem; background: var(--brand-orange-soft); color: var(--brand-navy); border: 1px solid var(--brand-orange-border); border-radius: 999px; font-size: 0.85rem; margin: 0.15rem 0.3rem 0.15rem 0;';
  const chips = items
    .filter(k => k !== 'other')
    .map(k => {
      const entry = RESOURCE_TYPES.find(x => x.key === k);
      const label = entry ? t(entry.tKey) : k;
      return `<span style="${pillStyle}">${label}</span>`;
    })
    .join('');
  const otherChip = items.includes('other') && res.other
    ? `<span style="${pillStyle}">${t('res_other')}: ${res.other}</span>`
    : '';
  return `
    <div class="detail-block">
      <div class="detail-label">${t('lbl_resources_detail')}</div>
      <div class="detail-value" style="line-height: 2;">${chips}${otherChip}</div>
    </div>
  `;
}

  activities.unshift({ reqId, date: new Date().toISOString(), text, visibleTo: ['all'] });
  saveData('activities', activities);
}

                  <td><div class="role-title">${esc(r.roleTitle)}</div><div class="role-meta">${esc([getBuName(r.buId), r.function, r.grade].filter(Boolean).join(" · "))}</div></td>
                  <td>${statusBadge(r.status)}</td>
                </tr>
              `).join('')}</tbody>
            </table>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderReqRow(r) {
  const days = daysSince(getStageDate(r));
  const target = getSLATarget(r.status);
  const slaClass = target > 0 ? getSLAClass(days, target) : '';
  const dSuffix = t('txt_days').charAt(0);

  // For active_sourcing reqs, compute per-stage candidate counts so the Requester
  // can see progress at a glance without clicking into the detail view.
  let pipelineChips = '';
  if (r.status === 'active_sourcing') {
    const reqCands = candidates.filter(c => c.reqId === r.id && c.status === 'active');
    const counts = {
      sourcing:     reqCands.filter(c => c.stage === 'sourcing').length,
      screening:    reqCands.filter(c => c.stage === 'screening').length,
      interview:    reqCands.filter(c => c.stage === 'interview').length,
      preemployment:reqCands.filter(c => c.stage === 'preemployment').length,
      offer:        reqCands.filter(c => c.stage === 'offer').length,
    };
    const labels = {
      sourcing: t('metric_sourcing'),
      screening: t('stage_screening') || 'Screening',
      interview: t('metric_interviews'),
      preemployment: t('btn_pre_emp'),
      offer: t('btn_offer'),
    };
    const nonZero = Object.entries(counts).filter(([, n]) => n > 0);
    if (reqCands.length === 0) {
      pipelineChips = `<div class="role-meta" style="margin-top: 0.25rem; color: var(--ink-4);">No candidates yet</div>`;
    } else {
      pipelineChips = `<div class="role-meta" style="margin-top: 0.25rem;">${nonZero.map(([k, n]) => `${labels[k]}: <strong>${n}</strong>`).join(' · ')}</div>`;
    }
  }

  return `
    <tr class="clickable" onclick="viewReq('${escJs(r.id)}')">
      <td>
        <span class="req-id">${esc(r.id)}</span>
        ${r.approvalPath === 'ceo_required' ? '<span class="badge badge-ceo" style="margin-left: 0.4rem;">CEO</span>' : ''}
      </td>
      <td>
        <div class="role-title">${esc(r.roleTitle)}</div>
        <div class="role-meta">${esc([getBuName(r.buId), r.function, r.grade].filter(Boolean).join(" · "))}</div>
        ${pipelineChips}
      </td>
      <td>${statusBadge(r.status)}</td>
      <td><span class="text-sm">${esc(getCurrentOwner(r))}</span></td>
      <td>
        <div class="sla-indicator ${slaClass}">
          <span class="sla-value">${days}${dSuffix}</span>
          ${target > 0 ? `<span class="sla-target">/ ${target}${dSuffix}</span>` : ''}
        </div>
      </td>
    </tr>
  `;
}

function updateSubFunctions() {
  const fn = document.getElementById('function').value;
  const sub = document.getElementById('subFunction');
  sub.innerHTML = `<option value="">${t('ph_select_sub')}</option>`;
  sub.disabled = !fn;
  if (fn && ORG_STRUCTURE[fn]) Object.keys(ORG_STRUCTURE[fn]).forEach(s => sub.innerHTML += `<option value="${s}">${s}</option>`);
  const unit = document.getElementById('unit');
  unit.innerHTML = `<option value="">${t('ph_select_sub')}</option>`;
  unit.disabled = true;
}
function updateUnits() {
  const fn = document.getElementById('function').value;
  const sub = document.getElementById('subFunction').value;
  const unit = document.getElementById('unit');
  unit.innerHTML = `<option value="">${t('ph_select_unit')}</option>`;
  const sections = (fn && sub && ORG_STRUCTURE[fn]?.[sub]) || [];
  // Sections are optional and only exist for a few departments; disable the
  // dropdown when none are defined so the requester knows it's intentionally empty.
  unit.disabled = sections.length === 0;
  sections.forEach(u => unit.innerHTML += `<option value="${u}">${u}</option>`);
}
function toggleNewRole() {
  const roleSelect = document.getElementById('roleSelect').value;
  document.getElementById('newRoleFields').classList.toggle('hidden', roleSelect !== 'NEW');
  renderJDSlot(roleSelect);
}

// Pre-fill the new-req form with existing req values when in edit mode.
// Called after renderNewReqForm() returns its HTML, so DOM elements exist.
// Mirrors the inverse of submitNewReq's read logic.
function prefillEditForm(reqId) {
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  // Organization cascade — set function, trigger subFunction list, set sub, trigger units, set unit
  const fnEl = document.getElementById('function');
  if (fnEl && r.function) {
    fnEl.value = r.function;
    updateSubFunctions();
    const subEl = document.getElementById('subFunction');
    if (subEl && r.subFunction) {
      subEl.value = r.subFunction;
      updateUnits();
      const unitEl = document.getElementById('unit');
      if (unitEl && r.unit) unitEl.value = r.unit;
    }
  }
  // Role
  const roleEl = document.getElementById('roleSelect');
  if (roleEl) {
    if (r.roleId) {
      roleEl.value = r.roleId;
    } else if (r.isNewRole) {
      roleEl.value = 'NEW';
      const titleEl = document.getElementById('newRoleTitle');
      const gradeEl = document.getElementById('newRoleGrade');
      if (titleEl) titleEl.value = r.roleTitle || '';
      if (gradeEl) gradeEl.value = r.grade || '';
    }
    toggleNewRole();
  }
  // Replacement / planned radios
  const repRadio = document.querySelector(`input[name="isReplacement"][value="${r.isReplacement ? 'yes' : 'no'}"]`);
  if (repRadio) repRadio.checked = true;
  const planRadio = document.querySelector(`input[name="isPlanned"][value="${r.isPlanned ? 'yes' : 'no'}"]`);
  if (planRadio) planRadio.checked = true;
  if (typeof checkUnplanned === 'function') checkUnplanned();
  // Justification
  const justEl = document.getElementById('justification');
  if (justEl) justEl.value = r.justification || '';
  // Resources
  const res = r.resourcesRequired || { items: [], other: null };
  if (Array.isArray(res.items)) {
    res.items.forEach(key => {
      const cb = document.querySelector(`input[name="resources"][value="${key}"]`);
      if (cb) cb.checked = true;
    });
  }
  if (res.other) {
    const otherInput = document.getElementById('resOtherText');
    if (otherInput) otherInput.value = res.other;
    const otherWrap = document.getElementById('resOtherWrap');
    if (otherWrap) otherWrap.classList.remove('hidden');
    const otherCb = document.querySelector(`input[name="resources"][value="other"]`);
    if (otherCb) otherCb.checked = true;
  }
  if (Array.isArray(res.items) && res.items.length === 0 && !res.other) {
    const noneCb = document.getElementById('resNone');
    if (noneCb) noneCb.checked = true;
  }
  // Reporting (supervisor + HM)
  const supEl = document.getElementById('immediateSupervisor');
  if (supEl && r.immediateSupervisor) {
    // Try to find the matching employee for a richer label; fall back to raw name
    const emp = employeeMaps.list.find(e => e.id === r.immediateSupervisorId) ||
                employeeMaps.list.find(e => e.name_en === r.immediateSupervisor);
    supEl.value = emp ? `${emp.name_en} — ${emp.position_title || ''} (${emp.grade || ''})` : r.immediateSupervisor;
  }
  // Same HM logic — if hiringManager is empty/same as supervisor, mark "yes"; else "no" + populate
  const sameHMYes = document.querySelector(`input[name="sameHM"][value="yes"]`);
  const sameHMNo = document.querySelector(`input[name="sameHM"][value="no"]`);
  const hmField = document.getElementById('hmField');
  const hmEl = document.getElementById('hiringManager');
  if (r.hiringManager && r.hiringManager !== r.immediateSupervisor) {
    if (sameHMNo) sameHMNo.checked = true;
    if (hmField) hmField.classList.remove('hidden');
    if (hmEl) {
      const emp = employeeMaps.list.find(e => e.id === r.hiringManagerId) ||
                  employeeMaps.list.find(e => e.name_en === r.hiringManager);
      hmEl.value = emp ? `${emp.name_en} — ${emp.position_title || ''} (${emp.grade || ''})` : r.hiringManager;
    }
  } else {
    if (sameHMYes) sameHMYes.checked = true;
  }
  // Target fill date — if a date input exists in the form
  const tfEl = document.getElementById('targetFillDate');
  if (tfEl && r.targetFillDate) {
    tfEl.value = r.targetFillDate.slice(0, 10);  // YYYY-MM-DD
  }
}

// Render the JD section in the new-req form. If the selected role has a
// standard JD in the library, show a "Attached from library" notice with a
// View button (preview before submit). Otherwise show the manual upload input.
function renderJDSlot(roleSelectValue) {
  const slot = document.getElementById('jdSlot');
  if (!slot) return;
  // No role selected yet, or user is creating a NEW role: standard JD doesn't
  // exist, so show the manual upload as today.
  if (!roleSelectValue || roleSelectValue === 'NEW') {
    slot.innerHTML = `
      <input type="file" id="jdFile" accept=".pdf">
      <div class="form-hint">${t('hint_jd')}</div>
    `;
    return;
  }
  const role = roleLibMaps.byLegacyId[roleSelectValue];
  if (role && role.standard_jd_path) {
    // Standard JD available — auto-attach, no upload input. Requester sees a
    // "from library" indicator and can click View to preview before submitting.
    slot.innerHTML = `
      <div class="jd-viewer" style="padding: 1rem; display: flex; align-items: center; gap: 0.75rem;">
        <div style="color: var(--success);">${ICONS.doc || '📄'}</div>
        <div style="flex: 1;">
          <div style="font-weight: 500;">${t('jd_from_library') || 'Standard JD attached from library'}</div>
          <div class="text-xs text-muted">${role.standard_jd_filename || 'Standard JD.pdf'}</div>
        </div>
        <button type="button" class="btn btn-secondary btn-sm" onclick="viewLibraryJD('${role.id}')">${t('btn_view_jd') || 'View JD'}</button>
      </div>
    `;
  } else {
    // No standard JD for this role yet — fall back to manual upload.
    slot.innerHTML = `
      <input type="file" id="jdFile" accept=".pdf">
      <div class="form-hint">${t('hint_jd')}</div>
    `;
  }
}

// Open a library-owned standard JD via signed URL (preview before submit).
async function viewLibraryJD(roleLibraryId) {
  const role = roleLibMaps.byId[roleLibraryId];
  if (!role || !role.standard_jd_path) { toast('Standard JD not found', true); return; }
  try {
    const { data, error } = await sb.storage
      .from('hire-medha')
      .createSignedUrl(role.standard_jd_path, 3600);
    if (error) throw error;
    if (!data?.signedUrl) throw new Error('No URL returned');
    window.open(data.signedUrl, '_blank', 'noopener');
  } catch (e) {
    console.error('viewLibraryJD failed:', e);
    toast('Could not open standard JD: ' + (e.message || e), true);
  }
}
function toggleHMField() { document.getElementById('hmField').classList.toggle('hidden', document.querySelector('input[name="sameHM"]:checked').value === 'yes'); }
function onResourceChange() {
  const noneBox = document.getElementById('resNone');
  const resources = document.querySelectorAll('input[name="resources"]');
  // If "None" is checked, uncheck every resource
  if (noneBox && noneBox.checked) {
    resources.forEach(r => { r.checked = false; });
  }
  // If any real resource is checked, auto-uncheck "None"
  const anyChecked = [...resources].some(r => r.checked);
  if (anyChecked && noneBox) noneBox.checked = false;
  // Show/hide the "other" free-text field
  const otherBox = document.querySelector('input[name="resources"][value="other"]');
  const otherWrap = document.getElementById('resOtherWrap');
  if (otherBox && otherWrap) {
    otherWrap.classList.toggle('hidden', !otherBox.checked);
  }
}
function checkUnplanned() {
  const rep = document.querySelector('input[name="isReplacement"]:checked');
  const plan = document.querySelector('input[name="isPlanned"]:checked');
  document.getElementById('unplannedWarning').classList.toggle('hidden', !(rep && plan && rep.value === 'no' && plan.value === 'no'));
}

// ⭐ Fetch a short-lived signed URL for a JD and open it in a new tab.
// The URL expires in 1 hour so even if copied/shared, exposure is time-limited.
async function viewJD(reqDbId) {
  if (!reqDbId) { toast('JD unavailable (legacy req)', true); return; }
  const req = requisitions.find(r => r._dbId === reqDbId);
  if (!req || !req.jdStoragePath) { toast('JD not found', true); return; }
  try {
    const { data, error } = await sb.storage
      .from('hire-medha')
      .createSignedUrl(req.jdStoragePath, 3600);  // 1 hour TTL
    if (error) throw error;
    if (!data?.signedUrl) throw new Error('No URL returned');
    window.open(data.signedUrl, '_blank', 'noopener');
  } catch (e) {
    console.error('viewJD failed:', e);
    toast('Could not open JD: ' + (e.message || e), true);
  }
}

// ⭐ Fetch a short-lived signed URL for a CV and open it in a new tab.
// Role-gated: CVs contain PII and should only be viewable by recruiters,
// hiring managers, HRBPs, head TA, and admins. Requesters and function
// heads are NOT meant to pre-evaluate candidates.
async function viewCV(candDbId) {
  const allowedRoles = ['admin','recruiter','hiring_manager','hrbp','head_ta'];
  if (!allowedRoles.includes(currentMember?.role)) {
    toast('You do not have permission to view CVs', true);
    return;
  }
  if (!candDbId) { toast('CV unavailable (legacy candidate)', true); return; }
  const cand = candidates.find(c => c._dbId === candDbId);
  if (!cand || !cand.cvStoragePath) { toast('CV not found', true); return; }
  try {
    const { data, error } = await sb.storage
      .from('hire-medha')
      .createSignedUrl(cand.cvStoragePath, 3600);  // 1 hour TTL
    if (error) throw error;
    if (!data?.signedUrl) throw new Error('No URL returned');
    window.open(data.signedUrl, '_blank', 'noopener');
  } catch (e) {
    console.error('viewCV failed:', e);
    toast('Could not open CV: ' + (e.message || e), true);
  }
}

async function submitNewReq() {
  const isEditing = !!editingReqId;
  const existingReq = isEditing ? requisitions.find(r => r.id === editingReqId) : null;
  if (isEditing && !existingReq) {
    alert('Requisition not found — please return to dashboard.');
    return;
  }

  const roleSelect = document.getElementById('roleSelect').value;
  if (!roleSelect) { alert('Please select a role'); return; }
  const buId = document.getElementById('bu')?.value || '';
  if (!buId) { alert('Please select a Business Unit'); return; }
  // Exec workflow — only HRBP/Head of TA see this field; for others it's null.
  const onBehalfOfEmpId = document.getElementById('onBehalfOf')?.value || null;
  const isRep = document.querySelector('input[name="isReplacement"]:checked');
  const isPlan = document.querySelector('input[name="isPlanned"]:checked');
  if (!isRep || !isPlan) { alert('Please answer replacement and planned headcount'); return; }

  // ⭐ JD handling: if the selected role has a standard JD in the library,
  // the requester doesn't need to (and can't) upload one — we auto-attach
  // the library path. Otherwise, the file input is present and required.
  // EDIT MODE: if no new JD file is selected and the existing req already has
  // a JD attached, we keep the existing one. Otherwise apply the same rules.
  const selectedRoleLib = (roleSelect && roleSelect !== 'NEW') ? roleLibMaps.byLegacyId[roleSelect] : null;
  const useLibraryJD = !!(selectedRoleLib && selectedRoleLib.standard_jd_path);
  const jdFileEl = document.getElementById('jdFile');
  const jdFile = jdFileEl ? jdFileEl.files[0] : null;
  const keepExistingJD = isEditing && !jdFile && !useLibraryJD && existingReq?.jdStoragePath;
  if (!useLibraryJD && !keepExistingJD) {
    if (!jdFile) { alert('Please upload JD'); return; }
    if (jdFile.type !== 'application/pdf') { alert('JD must be PDF'); return; }
  }
  
  let roleTitle, grade, isNewRole, roleId;
  if (roleSelect === 'NEW') {
    roleTitle = document.getElementById('newRoleTitle').value.trim();
    grade = document.getElementById('newRoleGrade').value;
    if (!roleTitle || !grade) { alert('Fill new role details'); return; }
    isNewRole = true; roleId = null;
  } else {
    const role = EXISTING_ROLES.find(r => r.id === roleSelect);
    roleTitle = role.title; grade = role.grade; isNewRole = false; roleId = role.id;
  }
  
  const sameHM = document.querySelector('input[name="sameHM"]:checked').value;
  const supTyped = document.getElementById('immediateSupervisor').value.trim();
  const hmTyped  = sameHM === 'yes' ? supTyped : document.getElementById('hiringManager').value.trim();
  if (!supTyped) { alert('Select immediate supervisor'); return; }
  if (sameHM === 'no' && !hmTyped) { alert('Select hiring manager'); return; }

  // ⭐ Convert the typed label back to an employee record. Labels are
  // "Name — Position (Grade)" — we match by label prefix. If no match is
  // found, the user typed a freeform value we don't recognize — reject.
  const labelFor = e => `${e.name_en} — ${e.position_title || ''} (${e.grade || ''})`;
  const supEmp = employeeMaps.list.find(e => labelFor(e) === supTyped);
  if (!supEmp) {
    alert('Immediate supervisor must be selected from the list. Typed value "' + supTyped + '" was not found.');
    return;
  }
  const hmEmp = sameHM === 'yes' ? supEmp : employeeMaps.list.find(e => labelFor(e) === hmTyped);
  if (sameHM === 'no' && !hmEmp) {
    alert('Hiring manager must be selected from the list. Typed value "' + hmTyped + '" was not found.');
    return;
  }

  // Map the selected employees to both the employee_id (always) and the
  // user_id (only if they have a linked login). Keep legacy supId/hmId as
  // user UUIDs for backward-compat code paths.
  const supEmpId = supEmp.id;
  const hmEmpId  = hmEmp.id;
  const supUserId = supEmp.user_id || null;
  const hmUserId  = hmEmp.user_id || null;
  // Legacy code expects these to be truthy strings — use the employee_id as a
  // stable stand-in when no user_id is available. The DB save uses the real
  // employee_id column regardless.
  const supId = supUserId || supEmpId;
  const hmId  = hmUserId  || hmEmpId;

  // ============================================================
  // EXEC WORKFLOW — detect & validate
  // ============================================================
  // Determine if this is an exec hire (HM is FH or CEO).
  const execHireType = detectExecHireType(hmEmpId);
  // Cross-validate: if HM is exec, the requester MUST specify "on behalf of"
  // (since the exec themselves shouldn't be the requester). The exception is
  // when the current user is the platform admin.
  if (execHireType !== 'normal' && canRaiseReqOnBehalf() && !onBehalfOfEmpId) {
    alert('This is an exec-level hire (Hiring Manager is a Function Head or CEO). Please pick "On behalf of" — specify which executive is the actual requesting authority.');
    return;
  }
  // Sanity: regular requesters can't raise exec reqs (they don't have the
  // "on behalf of" field, which is required). They get a clear error.
  if (execHireType !== 'normal' && !canRaiseReqOnBehalf()) {
    alert('This Hiring Manager is a Function Head or the CEO. Exec-level reqs must be raised by HRBP or Head of TA on behalf of the executive. Please ask your HRBP to raise this requisition.');
    return;
  }
  // Sanity: if "on behalf of" is set, the named exec must actually be a FH or CEO.
  // (Defends against stale data — e.g. someone was de-flagged after being picked.)
  if (onBehalfOfEmpId) {
    const execEmp = (employeeMaps.list || []).find(e => e.id === onBehalfOfEmpId);
    if (!execEmp || (!execEmp.is_function_head && !execEmp.is_ceo)) {
      alert('The selected "On behalf of" person is no longer marked as Function Head or CEO. Please re-select.');
      return;
    }
  }

  // Resources validation
  const noneBox = document.getElementById('resNone');
  const pickedResources = [...document.querySelectorAll('input[name="resources"]:checked')].map(el => el.value);
  const noneTicked = !!(noneBox && noneBox.checked);
  if (!noneTicked && pickedResources.length === 0) {
    alert(t('err_resources_required'));
    return;
  }
  const otherText = (document.getElementById('resOtherText')?.value || '').trim();
  if (pickedResources.includes('other') && !otherText) {
    alert(t('err_res_other'));
    return;
  }
  const resourcesRequired = noneTicked
    ? { items: [], other: null }
    : { items: pickedResources, other: pickedResources.includes('other') ? otherText : null };

  const isUnplanned = isRep.value === 'no' && isPlan.value === 'no';

  // ============================================================
  // EDIT MODE: update existing requisition in place
  // ============================================================
  if (isEditing) {
    const r = existingReq;
    // Apply edits to the in-memory object
    r.roleId = roleId;
    r.roleTitle = roleTitle;
    r.isNewRole = isNewRole;
    r.grade = grade;
    r.buId = buId;
    r.function = document.getElementById('function').value;
    r.subFunction = document.getElementById('subFunction').value;
    r.unit = document.getElementById('unit').value;
    r.raisedOnBehalfOfEmpId = onBehalfOfEmpId || null;
    r.isReplacement = isRep.value === 'yes';
    r.isPlanned = isPlan.value === 'yes';
    r.justification = document.getElementById('justification').value;
    r.resourcesRequired = resourcesRequired;
    r.immediateSupervisorId = supId;
    r.hiringManagerId = hmId;
    r.supervisorEmpId = supEmpId;
    r.hmEmpId = hmEmpId;
    // Approval path:
    //  - exec_track: HM is the CEO. Skip HRBP+FH, go directly to CEO approval.
    //  - fh_direct:  HM is a Function Head. HRBP reviews, then routes to that
    //                specific FH (filter applied at the queue level).
    //  - ceo_required: unplanned hire — standard path with CEO at the end.
    //  - standard: HRBP -> FH (no CEO).
    if (execHireType === 'ceo_hire') {
      r.approvalPath = 'exec_track';
      r.status = 'ceo_approval';   // skip HRBP + FH, go directly to CEO
    } else if (execHireType === 'fh_hire') {
      r.approvalPath = 'fh_direct';
      r.status = 'hrbp_review';    // HRBP review still required as compliance gate
    } else {
      r.approvalPath = isUnplanned ? 'ceo_required' : 'standard';
      r.status = 'hrbp_review';
    }
    r.hrbpApprovedAt = null;
    r.fhApprovedAt = null;
    r.ceoApprovedAt = null;
    r.taAssignedAt = null;
    r.hrbpJustification = null;
    r.fhJustification = null;
    r.ceoJustification = null;
    // Keep revisionNotes for audit trail (so HRBP sees what was previously asked)

    // Persist
    try {
      await saveSingleRequisition(r);
    } catch (e) {
      alert('Failed to resubmit: ' + (e.message || e));
      return;
    }

    // JD: if a new file was provided OR the user changed roles to one with a
    // library JD, replace the JD; otherwise keep the existing one.
    if (r._dbId && currentMember?.tenant_id && (jdFile || useLibraryJD)) {
      try {
        const ts = Date.now();
        let storagePath, displayName, uploadBlob, uploadContentType;
        if (jdFile) {
          uploadBlob = jdFile;
          uploadContentType = 'application/pdf';
          const safeName = jdFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          storagePath = `jds/${currentMember.tenant_id}/${r._dbId}/${ts}-${safeName}`;
          displayName = jdFile.name;
        } else if (useLibraryJD) {
          displayName = selectedRoleLib.standard_jd_filename || 'Standard JD.pdf';
          const { data: sig, error: sigErr } = await sb.storage
            .from('hire-medha').createSignedUrl(selectedRoleLib.standard_jd_path, 60);
          if (sigErr) throw sigErr;
          const resp = await fetch(sig.signedUrl);
          if (!resp.ok) throw new Error('Could not fetch library JD: HTTP ' + resp.status);
          uploadBlob = await resp.blob();
          uploadContentType = 'application/pdf';
          const safeName = displayName.replace(/[^a-zA-Z0-9._-]/g, '_');
          storagePath = `jds/${currentMember.tenant_id}/${r._dbId}/${ts}-lib-${safeName}`;
        }
        const { error: upErr } = await sb.storage
          .from('hire-medha').upload(storagePath, uploadBlob, { contentType: uploadContentType, upsert: false });
        if (upErr) throw upErr;
        const { error: updErr } = await sb.from('requisitions').update({
          jd_storage_path: storagePath,
          jd_uploaded_at: new Date().toISOString(),
          jd_filename: displayName,
        }).eq('id', r._dbId);
        if (updErr) throw updErr;
        r.jdStoragePath = storagePath;
        r.jdFilename = displayName;
        r.jdUploadedAt = new Date().toISOString();
      } catch (e) {
        console.error('JD persist (revise) failed:', e);
        toast('Resubmitted, but JD update failed: ' + (e.message || e), true);
      }
    }

    logActivity(r.id, 'Requisition revised by requester — back to HRBP review');
    await saveData('activities', activities);
    editingReqId = null;
    selectedReqId = r.id;
    alert(`Requisition ${r.id} revised and resubmitted to HRBP review.`);
    setView('req_detail');
    return;
  }

  // ============================================================
  // CREATE MODE: original new-req flow continues below
  // ============================================================
  const newReq = {
    id: generateReqId(), roleId, roleTitle, isNewRole, grade,
    buId,
    function: document.getElementById('function').value,
    subFunction: document.getElementById('subFunction').value,
    unit: document.getElementById('unit').value,
    raisedOnBehalfOfEmpId: onBehalfOfEmpId || null,
    isReplacement: isRep.value === 'yes', isPlanned: isPlan.value === 'yes',
    justification: document.getElementById('justification').value,
    resourcesRequired,
    hrbpJustification: null, fhJustification: null, ceoJustification: null,
    immediateSupervisorId: supId, hiringManagerId: hmId, requesterId: currentUserId,
    supervisorEmpId: supEmpId, hmEmpId: hmEmpId,
    jdFilename: useLibraryJD ? (selectedRoleLib.standard_jd_filename || 'Standard JD.pdf') : jdFile.name,
    // Approval path & status set conditionally:
    //  - exec_track  (HM is CEO): skip HRBP+FH, route directly to CEO
    //  - fh_direct   (HM is FH): HRBP reviews then routes to that specific FH only
    //  - ceo_required (unplanned hire): standard path with CEO at the end
    //  - standard: HRBP -> FH (no CEO)
    status: execHireType === 'ceo_hire' ? 'ceo_approval' : 'hrbp_review',
    approvalPath: execHireType === 'ceo_hire' ? 'exec_track'
                : execHireType === 'fh_hire' ? 'fh_direct'
                : (isUnplanned ? 'ceo_required' : 'standard'),
    submittedAt: new Date().toISOString(),
    hrbpApprovedAt: null, fhApprovedAt: null, ceoApprovedAt: null,
    taAssignedAt: null, assignedRecruiters: [],
    targetFillDate: null, rejectionReason: null, revisionNotes: null
  };
  requisitions.push(newReq);
  // Targeted single-req save: await the insert so _dbId is set BEFORE we log activity
  try {
    await saveSingleRequisition(newReq);
  } catch (e) {
    // Roll back the push so the UI state stays consistent
    requisitions.pop();
    alert('Failed to submit: ' + (e.message || e));
    return;
  }

  // ⭐ JD persistence: two code paths, both produce a req-owned storage object.
  //   (A) LIBRARY PATH: role has a standard JD. Download the library PDF and
  //       re-upload it into the req's own folder. This SNAPSHOTS the JD at
  //       submission time (historical accuracy) — if HR later replaces the
  //       library version, existing reqs keep their original copy.
  //   (B) MANUAL UPLOAD: as before — upload the user-selected file.
  // Both end at the same state: jd_storage_path points to a file the req owns.
  if (newReq._dbId && currentMember?.tenant_id) {
    try {
      const ts = Date.now();
      let storagePath, displayName, uploadBlob, uploadContentType;
      if (useLibraryJD) {
        displayName = selectedRoleLib.standard_jd_filename || 'Standard JD.pdf';
        // Download the library PDF as a Blob via a signed URL
        const { data: sig, error: sigErr } = await sb.storage
          .from('hire-medha')
          .createSignedUrl(selectedRoleLib.standard_jd_path, 60);
        if (sigErr) throw sigErr;
        const resp = await fetch(sig.signedUrl);
        if (!resp.ok) throw new Error('Could not fetch library JD: HTTP ' + resp.status);
        uploadBlob = await resp.blob();
        uploadContentType = 'application/pdf';
        const safeName = displayName.replace(/[^a-zA-Z0-9._-]/g, '_');
        storagePath = `jds/${currentMember.tenant_id}/${newReq._dbId}/${ts}-lib-${safeName}`;
      } else {
        uploadBlob = jdFile;
        uploadContentType = 'application/pdf';
        const safeName = jdFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        storagePath = `jds/${currentMember.tenant_id}/${newReq._dbId}/${ts}-${safeName}`;
        displayName = jdFile.name;
      }
      const { error: upErr } = await sb.storage
        .from('hire-medha')
        .upload(storagePath, uploadBlob, { contentType: uploadContentType, upsert: false });
      if (upErr) throw upErr;
      const { error: updErr } = await sb
        .from('requisitions')
        .update({
          jd_storage_path: storagePath,
          jd_uploaded_at: new Date().toISOString(),
          jd_filename: displayName,
        })
        .eq('id', newReq._dbId);
      if (updErr) throw updErr;
      newReq.jdStoragePath = storagePath;
      newReq.jdFilename = displayName;
      newReq.jdUploadedAt = new Date().toISOString();
    } catch (e) {
      console.error('JD persist failed:', e);
      toast('Requisition saved, but JD attach failed: ' + (e.message || e), true);
    }
  }

  logActivity(newReq.id, 'Requisition submitted');
  await saveData('activities', activities);  // persist the activity row now that _dbId exists
  alert(`Requisition ${newReq.id} submitted.${isUnplanned ? '\n\nNote: Requires CEO approval.' : ''}`);
  setView('dashboard');
}

function switchTab(name, event) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  document.getElementById('tab-' + name).classList.remove('hidden');
}

async function saveField(reqId, field) {
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  r[field] = document.getElementById(field).value;
  try {
    await saveSingleRequisition(r);
  } catch (e) {
    console.error('saveField failed:', e);
    toast('Field autosave failed: ' + (e.message || e), true);
  }
}

async function approveHRBP(reqId) {
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  const ta = document.getElementById('hrbpJustification');
  if (ta) r.hrbpJustification = ta.value;
  r.hrbpApprovedAt = new Date().toISOString();
  r.status = 'fh_approval';
  await persistReqChange(r, 'Approved by HRBP');
}

function requestRevision(reqId, from) {
  openModal(`
    <div class="modal-header"><h2>${t('modal_revisions')}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    <p class="modal-desc">${t('modal_rev_desc')}</p>
    <div class="form-group">
      <label class="required">${t('lbl_rev_notes')}</label>
      <textarea id="revisionNotes" rows="4" placeholder="${t('ph_revision')}"></textarea>
    </div>
    <div class="form-group">
      <label class="checkbox-row"><input type="checkbox" id="requestNewJD"> ${t('hint_req_new_jd')}</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">${t('btn_cancel')}</button>
      <button class="btn btn-warning" onclick="submitRevision('${reqId}', '${from}')">${t('btn_send_back')}</button>
    </div>
  `);
}

async function submitRevision(reqId, from) {
  const notes = document.getElementById('revisionNotes').value;
  if (!notes.trim()) { alert('Please provide revision notes'); return; }
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  r.revisionNotes = notes;
  r.status = 'revisions_requested';
  await persistReqChange(r, `Revisions requested by ${from.toUpperCase()}`);
}

function rejectReq(reqId, from) {
  openModal(`
    <div class="modal-header"><h2 style="color: var(--danger);">${t('modal_reject')}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="banner banner-warning" style="margin-bottom: 1rem;">
      <span class="banner-icon">${ICONS.warning}</span>
      <span>${t('banner_cannot_undo')}</span>
    </div>
    <div class="form-group">
      <label class="required">${t('lbl_reject_reason')}</label>
      <textarea id="rejectionReason" rows="4" placeholder="${t('ph_reject')}"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">${t('btn_cancel')}</button>
      <button class="btn btn-danger" onclick="submitRejection('${reqId}', '${from}')">${ICONS.x} ${t('btn_confirm_reject')}</button>
    </div>
  `);
}

async function submitRejection(reqId, from) {
  const reason = document.getElementById('rejectionReason').value;
  if (!reason.trim()) { alert('Please provide reason'); return; }
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  r.rejectionReason = `Rejected by ${from.toUpperCase()}: ${reason}`;
  r.status = 'rejected';
  await persistReqChange(r, `Rejected by ${from.toUpperCase()}`);
}

function closeReqModal(reqId) {
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  const c = candidates.find(c => c.reqId === reqId && c.offer && c.offer.status === 'accepted');
  openModal(`
    <div class="modal-header"><h2>${t('modal_close_req')}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="detail-row"><span class="detail-label">${t('sec_req')}</span><span class="detail-value">${esc(r.id)} — ${esc(r.roleTitle)}</span></div>
    <div class="detail-row"><span class="detail-label">${t('th_candidate')}</span><span class="detail-value">${c ? esc(c.name) : '—'}</span></div>
    <div class="detail-row"><span class="detail-label">${t('th_start_date')}</span><span class="detail-value">${c && c.offer ? formatDate(c.offer.startDate) : '—'}</span></div>
    <div class="form-group mt-2">
      <label class="checkbox-row"><input type="checkbox" id="startedWork"> ${t('cand_started')}</label>
      <label class="checkbox-row"><input type="checkbox" id="onboardingDone"> ${t('cand_onboarded')}</label>
    </div>
    <div class="form-group">
      <label>${t('notes_optional')}</label>
      <textarea id="closeNotes" rows="3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">${t('btn_cancel')}</button>
      <button class="btn btn-success" onclick="confirmClose('${reqId}')">${ICONS.check} ${t('btn_close_req')}</button>
    </div>
  `);
}

async function confirmClose(reqId) {
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  r.status = 'closed';
  r.closedAt = new Date().toISOString();
  await persistReqChange(r, 'Requisition closed — filled');
}

async function submitHold(reqId) {
  const reason = document.getElementById('holdReason').value.trim();
  if (!reason) { alert('Please provide a reason'); return; }
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  r.previousStatus = r.status;
  r.status = 'on_hold';
  r.holdReason = reason;
  r.heldAt = new Date().toISOString();
  const ok = await persistReqChange(r, `Put on hold by requester: ${reason.length > 80 ? reason.substring(0, 80) + '…' : reason}`, { nextView: null });
  if (ok) render();
}

// Enter edit mode for an existing requisition (typically after HRBP requested
// revisions). Sets the editingReqId flag and navigates to the new-req form,
// which will pre-fill all fields from the existing req.
function reviseReq(reqId) {
  const r = requisitions.find(x => x.id === reqId);
  if (!r) { toast('Requisition not found', true); return; }
  if (r.status !== 'revisions_requested') {
    toast('This requisition is not pending revision', true);
    return;
  }
  editingReqId = reqId;
  selectedReqId = null;
  setView('new_req');
}

function resumeReq(reqId) {
  openModal(`
    <div class="modal-header"><h2>${t('modal_resume')}</h2><button class="modal-close" onclick="closeModal()">×</button></div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">${t('btn_cancel')}</button>
      <button class="btn btn-success" onclick="confirmResume('${reqId}')">${ICONS.check} ${t('btn_resume')}</button>
    </div>
  `);
}

async function confirmResume(reqId) {
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  const prev = r.previousStatus || 'hrbp_review';
  r.status = prev;
  r.holdReason = null;
  r.previousStatus = null;
  r.resumedAt = new Date().toISOString();
  const ok = await persistReqChange(r, `Resumed by requester — returned to ${getStatusLabel(prev)}`, { nextView: null });
  if (ok) render();
}

async function submitCancel(reqId) {

async function assignRecruiters(reqId) {
  const r = requisitions.find(x => x.id === reqId);
  if (!r) return;
  const checked = Array.from(document.querySelectorAll('#recruiterList input:checked')).map(cb => cb.value);
  if (checked.length === 0) { alert('Select at least one recruiter'); return; }

  const wasReassign = r.status === 'active_sourcing';
  r.assignedRecruiters = checked;
  if (!wasReassign) {
    r.taAssignedAt = new Date().toISOString();
    r.status = 'active_sourcing';
    r.targetFillDate = calculateTargetFillDate(r.grade, r.ceoApprovedAt || r.fhApprovedAt);
  }

  const activityText = wasReassign
    ? `Reassigned to ${checked.map(getUserName).join(', ')}`
    : `Assigned to ${checked.map(getUserName).join(', ')}`;

  // Also sync the requisition_recruiters M:N table: delete existing rows for
  // this req, then insert the new set. Only UUIDs that map to real tenant
  // members are persisted; unknown UUIDs are dropped defensively.
  const realChecked = checked.filter(uid => realUsersByUuid[uid]);
  if (r._dbId) {
    try {
      await sb.from('requisition_recruiters').delete().eq('requisition_id', r._dbId);
      if (realChecked.length > 0) {
        await sb.from('requisition_recruiters').insert(
          realChecked.map(uid => ({
            requisition_id: r._dbId,
            user_id: uid,
            assigned_by: currentAuthUser?.id,
          }))
        );
      }
    } catch (e) {
      console.error('recruiter assignment sync failed:', e);
      toast('Recruiter assignment partially saved: ' + (e.message || e), true);
    }
  }

  await persistReqChange(r, activityText);
}
